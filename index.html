<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ainoy Healthy ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff9f5;
            --peach: #ffb7b2;
            --mint: #baffc9;
            --blue: #bae1ff;
            --lavender: #e1ccff;
            --text: #5d5d5d;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background: var(--white);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(255, 183, 178, 0.2);
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        /* Header & Aesthetic Elements */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--peach);
            font-size: 2rem;
            margin: 0;
        }

        .header p {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Input Section */
        .input-group {
            background: #fef1f0;
            padding: 20px;
            border-radius: 25px;
            margin-bottom: 25px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid transparent;
            border-radius: 15px;
            outline: none;
            font-size: 0.9rem;
        }

        input:focus { border-color: var(--peach); }

        .btn-add {
            width: 100%;
            padding: 12px;
            background: var(--peach);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-add:active { transform: scale(0.95); }

        /* List Section */
        .section-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .schedule-list {
            list-style: none;
            padding: 0;
        }

        .card {
            display: flex;
            align-items: center;
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 12px;
            animation: slideIn 0.4s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-icon {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-right: 15px;
        }

        .card-info { flex: 1; }
        .card-info b { display: block; font-size: 1rem; }
        .card-info span { font-size: 0.8rem; opacity: 0.6; }

        /* Types Color */
        .type-rutinitas { background-color: var(--mint); }
        .type-hobi { background-color: var(--blue); }
        .type-special { background-color: var(--lavender); }

        .delete-btn {
            background: none;
            border: none;
            color: #ffcccc;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Lucu Decoration */
        .cloud {
            position: absolute;
            background: white;
            width: 100px;
            height: 40px;
            border-radius: 50px;
            top: -20px;
            right: -20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="cloud"></div>
    
    <div class="header">
        <h1>Ainoy Healthy ✨</h1>
        <p>Ayo produktif & sehat hari ini!</p>
    </div>

    <div class="input-group">
        <input type="text" id="taskName" placeholder="Nama kegiatan (misal: Yoga pagi)">
        <select id="taskType">
            <option value="rutinitas">🏠 Rutinitas</option>
            <option value="hobi">🎨 Hobi</option>
            <option value="special">🎉 Momen Spesial</option>
        </select>
        <button class="btn-add" onclick="addTask()">Tambah Jadwal 🌸</button>
    </div>

    <div class="section-title">Jadwal Kamu Hari Ini 🦄</div>
    <div id="scheduleList" class="schedule-list">
        </div>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem('ainoy_tasks')) || [];

    function renderTasks() {
        const list = document.getElementById('scheduleList');
        list.innerHTML = '';
        
        tasks.forEach((task, index) => {
            const icon = task.type === 'rutinitas' ? '🧘' : task.type === 'hobi' ? '🎨' : '✨';
            
            list.innerHTML += `
                <div class="card type-${task.type}">
                    <div class="card-icon">${icon}</div>
                    <div class="card-info">
                        <b>${task.name}</b>
                        <span>${task.type.toUpperCase()}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${index})">✕</button>
                </div>
            `;
        });
        localStorage.setItem('ainoy_tasks', JSON.stringify(tasks));
    }

    function addTask() {
        const name = document.getElementById('taskName').value;
        const type = document.getElementById('taskType').value;

        if (name) {
            tasks.push({ name, type });
            document.getElementById('taskName').value = '';
            renderTasks();
        } else {
            alert("Isi nama kegiatannya dulu ya cantik! ✨");
        }
    }

    function deleteTask(index) {
        tasks.splice(index, 1);
        renderTasks();
    }

    // Jalankan saat pertama kali buka
    renderTasks();
</script>

</body>
</html>
